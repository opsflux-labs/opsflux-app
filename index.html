<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsFlux Labs | DevOps Journey</title>
    <style>
        /* Modern Tech-Themed Styles */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        /* Countdown Grid Layout */
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .time-box {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 12px;
            min-width: 90px;
            border-bottom: 4px solid #38bdf8;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .time-number {
            font-size: 3rem;
            font-weight: 700;
            font-family: monospace;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .time-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-top: 0.5rem;
        }

        /* Interactive Rocket Button */
        .btn-launch {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-launch:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OpsFlux Labs</h1>
        <p class="subtitle">45-Day DevOps Roadmap Launching Soon</p>

        <div class="countdown-grid">
            <div class="time-box">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-box">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">Mins</div>
            </div>
            <div class="time-box">
                <div class="time-number" id="seconds">00</div>
                <div class="time-label">Secs</div>
            </div>
        </div>

        <button class="btn-launch" onclick="launchAlert()">Initialize Day 1</button>
    </div>

    <script>
        // Set target date to exactly 24 hours from now
        const targetDate = new Date().getTime() + (24 * 60 * 60 * 1000);

        // Update the countdown every single second
        const countdownTimer = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Time calculations for hours, minutes and seconds
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Inject the values straight into the unique HTML IDs
            document.getElementById("hours").innerHTML = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerHTML = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerHTML = String(seconds).padStart(2, '0');

            // If the countdown is finished
            if (difference < 0) {
                clearInterval(countdownTimer);
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
                document.querySelector("h1").innerHTML = "OpsFlux Is Live! 🚀";
            }
        }, 1000);

        // Interactive Button action
        function launchAlert() {
            alert("System Ready! 🐧 Day 1 of your Linux Foundations roadmap triggers tomorrow.");
        }
    </script>
</body>
</html>
